# Allowlist for tools/check_docs.py.
#
# Entries here are exceptions that could not (or should not) be fixed by
# editing the referenced doc page directly. Each entry must carry a reason
# and, where the underlying issue is real rather than a checker limitation,
# a TODO pointing at who/what should resolve it.

json: []
# All json fences in docs/ now either parse strictly as `json`, or are
# config-merge fragments/have comments and are tagged `jsonc`, which
# check_docs.py parses leniently: comments/trailing commas stripped, then
# accepted standalone or wrapped in `{ }` as a fragment.

python_imports:
  - module: ovos_stt_plugin_vosk
    reason: >
      docs/stt-plugins.md's standalone example imports VoskKaldiSTT from the
      optional ovos-stt-plugin-vosk package. Verified correct against the
      installed plugin (VoskKaldiSTT/VoskKaldiStreamingSTT exist); the plugin
      pulls the large vosk wheel and is intentionally not in the minimal CI
      python-imports install set.
  - module: ovos_mark1
    reason: >
      docs/mark1.md documents the optional `ovos-mark1-utils` PyPI package
      (import name `ovos_mark1`) for Mycroft Mark 1 hardware owners. Verified
      correct via a scratch `pip install ovos-mark1-utils` (top_level.txt ==
      ovos_mark1, has Mark1EnclosureAPI/Eyes/BlackScreen/Rule110). It is
      hardware-specific and intentionally not part of the shared dev venv or
      the CI python-imports install set.
  - module: ovos_hivemind_solver
    reason: >
      docs/hivemind-agents.md documents the optional
      `ovos-solver-hivemind-plugin` PyPI package (import name
      `ovos_hivemind_solver`, class HiveMindSolver). Verified correct via a
      scratch `pip install ovos-solver-hivemind-plugin`. Not part of the
      shared dev venv or CI install set (requires a provisioned HiveMind
      node identity to be useful).
  - module: ovos_PHAL
    reason: >
      docs/phal.md documents `ovos-PHAL` (import name `ovos_PHAL`, classes
      PHAL/AdminPHAL). Verified correct via a scratch `pip install ovos-PHAL`.
      Not part of the shared dev venv or the current CI install set; add it
      there if PHAL coverage becomes a priority.
  - module: ovos_color_parser
    reason: >
      docs/color-parser.md documents `ovos-color-parser` correctly, but the
      published PyPI wheel is missing its core/match/vocab subpackages
      (verified: the shared dev venv only imports it because it is installed
      editable from a local clone, not the released wheel). Tracked upstream
      in OpenVoiceOS/ovos-color-parser#116; remove this entry once a fixed
      release is published.
  - module: openai
    reason: >
      Provider SDK for the OpenAI-compatible API examples in
      docs/openai-plugin.md/docs/llm-transformers.md; a paid third-party SDK,
      intentionally not part of the shared dev venv or CI's installed set.
  - module: anthropic
    reason: >
      Provider SDK referenced by LLM-backend examples (e.g.
      docs/llm-transformers.md); a paid third-party SDK, intentionally not
      part of the shared dev venv or CI's installed set.

  # TODO(content-owner): docs/openai-plugin.md imports
  # `ovos_openai_plugin.translate.OpenAITextTranslator` and
  # `...OpenAITextLangDetector`. Neither the module `ovos_openai_plugin` nor
  # those classes exist; the installed package (`ovos-openai-plugin` on
  # PyPI) actually ships as top-level module `ovos_solver_openai_persona`
  # with classes OpenAIDialogTransformer / OpenAICompletionsSolver /
  # OpenAIChatCompletionsSolver - no translator/lang-detector classes at
  # all. This needs a real content rewrite (verify against source, replace
  # the example), out of scope for a small mechanical fix - allowlisting the
  # module rather than leaving CI red.
  - module: ovos_openai_plugin
    reason: >
      TODO(content-owner): invented import path and class names
      (OpenAITextTranslator/OpenAITextLangDetector do not exist anywhere in
      the actual ovos-openai-plugin package, whose real top-level module is
      ovos_solver_openai_persona). Needs a full example rewrite by whoever
      owns docs/openai-plugin.md, not a mechanical rename.
  - module: ovos_plugin_manager.templates.gui
    reason: >
      TODO(content-owner): docs/gui-adapters.md imports `AbstractGUIPlugin`
      from this module; it does not exist (module only exports
      GUIExtension/GUIInterface/HomescreenManager). See the matching
      signatures allowlist entry for docs/gui-adapters.md - same root cause,
      needs a full content audit/rewrite.

signatures:
  - file: docs/gui-adapters.md
    reason: >
      TODO(content-owner): the page documents a `AbstractGUIPlugin` base
      class with `handle_show_*` template-hook methods, imported from
      ovos_plugin_manager.templates.gui. That module actually exports
      `GUIExtension` (different __init__ signature: config, bus, gui,
      preload_gui, permanent) with no handle_show_* methods and no
      AbstractGUIPlugin at all. This looks like a hallucinated/outdated API
      description and needs a real content audit + rewrite, out of scope
      for a small mechanical fix.
